name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun x next build
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          NODE_ENV: production

      - name: Copy source to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "app,components,hooks,lib,public,scripts,middleware.ts,package.json,bun.lock,next.config.mjs,tsconfig.json,tailwind.config.ts,postcss.config.mjs,components.json,.eslintrc.json"
          target: /home/ubuntu/reports-app
          rm: false
          timeout: 180s
          command_timeout: 20m

      - name: Install, build, and restart service
        uses: appleboy/ssh-action@v1
        env:
          TELEGRAM_OAUTH_CLIENT_SECRET: ${{ secrets.TELEGRAM_OAUTH_CLIENT_SECRET }}
          DASHBOARD_SESSION_SECRET: ${{ secrets.DASHBOARD_SESSION_SECRET }}
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 180s
          command_timeout: 20m
          envs: TELEGRAM_OAUTH_CLIENT_SECRET,DASHBOARD_SESSION_SECRET
          script: |
            set -e
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"
            if ! command -v bun >/dev/null 2>&1; then
              curl -fsSL https://bun.sh/install | bash
            fi
            cd /home/ubuntu/reports-app
            # app/page.tsx was moved into app/(miniapp)/page.tsx; the scp step uses rm:false,
            # so remove the stale copy or Next sees two pages resolving to "/".
            rm -f app/page.tsx
            # Ensure dashboard env vars exist (append-only — never clobber existing values).
            touch .env.local
            grep -q '^NEXT_PUBLIC_APP_URL=' .env.local || echo "NEXT_PUBLIC_APP_URL=https://reportsv2.yall.uz" >> .env.local
            if [ -n "$TELEGRAM_OAUTH_CLIENT_SECRET" ] && ! grep -q '^TELEGRAM_OAUTH_CLIENT_SECRET=' .env.local; then echo "TELEGRAM_OAUTH_CLIENT_SECRET=$TELEGRAM_OAUTH_CLIENT_SECRET" >> .env.local; fi
            if [ -n "$DASHBOARD_SESSION_SECRET" ] && ! grep -q '^DASHBOARD_SESSION_SECRET=' .env.local; then echo "DASHBOARD_SESSION_SECRET=$DASHBOARD_SESSION_SECRET" >> .env.local; fi
            bun install --frozen-lockfile
            DATABASE_URL="${DATABASE_URL:-postgresql://dummy:dummy@localhost:5432/dummy}" NODE_ENV=production bun x next build
            sudo systemctl restart reports-app
            sleep 3
            curl -sf http://localhost:3002/ > /dev/null && echo "✅ Deploy successful" || echo "❌ Health check failed"
