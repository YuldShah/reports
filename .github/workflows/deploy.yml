name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun x next build
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          NODE_ENV: production

      - name: Copy build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          key: ${{ vars.VPS_SSH_KEY }}
          source: ".next,package.json,bun.lock,public,node_modules"
          target: /home/ubuntu/reports-app
          rm: false

      - name: Restart service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          key: ${{ vars.VPS_SSH_KEY }}
          script: |
            sudo systemctl restart reports-app
            sleep 3
            curl -sf http://localhost:3002/ > /dev/null && echo "✅ Deploy successful" || echo "❌ Health check failed"
